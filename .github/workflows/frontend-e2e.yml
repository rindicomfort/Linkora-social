name: Frontend E2E Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/frontend-e2e.yml"

jobs:
  e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Set up environment variables for localhost testing
        run: |
          echo "NEXT_PUBLIC_SOROBAN_RPC_URL=http://localhost:8000/rpc" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_NETWORK_PASSPHRASE=Standalone Network ; February 2017" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_CONTRACT_ID=CBQHLSNMBF4HS3UX2PV72T75V2SXE7M2EZZTQ6YC5DSXIGGY4NPSAFAF" >> $GITHUB_ENV

      - name: Run E2E tests
        working-directory: apps/web
        env:
          CI: true
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
